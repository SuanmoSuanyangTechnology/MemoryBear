services:
  # FastAPI application
  api:
    image: redbear-mem-open:latest
    container_name: api
    ports:
      - "8002:8000"
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    restart: unless-stopped
    networks:
      - default
      - celery
      - sandbox
    depends_on:
      - worker-memory
      - worker-document
      - worker-periodic

  # Memory worker - Memory read/write tasks (threads pool for asyncio)
  worker-memory:
    image: redbear-mem-open:latest
    container_name: worker-memory
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=threads --concurrency=100 --queues=memory_tasks -n memory_worker@%h
    restart: unless-stopped
    networks:
      - celery

  # Document worker - Document parsing tasks (prefork for CPU-bound)
  worker-document:
    image: redbear-mem-open:latest
    container_name: worker-document
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=prefork --concurrency=4 --queues=document_tasks --max-tasks-per-child=100 -n document_worker@%h
    restart: unless-stopped
    networks:
      - celery

  # Periodic worker - Scheduled/beat tasks + API-triggered tasks (prefork, low concurrency)
  worker-periodic:
    image: redbear-mem-open:latest
    container_name: worker-periodic
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=prefork --concurrency=2 --queues=periodic_tasks --max-tasks-per-child=50 -n periodic_worker@%h
    restart: unless-stopped
    networks:
      - celery

  # Subscription-state worker - 订阅状态变更（process_expired_subscriptions）
  # 轻量任务，每 10 分钟一次：
  #   - time-limit=600s (10min) 硬超时：单轮不应超过此值，否则 DB/锁竞争异常
  #   - prefetch-multiplier=1：避免长任务被单个 worker 进程预取过多
  worker-subscription-state:
    image: redbear-mem-open:latest
    container_name: worker-subscription-state
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=prefork --concurrency=4 --queues=subscription_state_tasks --time-limit=600 --soft-time-limit=540 --max-tasks-per-child=200 --prefetch-multiplier=1 -n subscription_state_worker@%h
    restart: unless-stopped
    networks:
      - celery

  # Subscription-email worker - 到期提醒/到期失效邮件发送（expiration_reminder / expired_notice）
  # 短任务循环模式：每 1 小时触发一次，单次执行 1h，未完成由下一轮继续
  # 依赖 Redis 游标防重复发送，单次失败不影响后续轮次
  #   - time-limit=3600s (1h) 硬超时
  #   - prefetch-multiplier=1：避免长邮件任务被单个 worker 进程预取过多
  worker-subscription-email:
    image: redbear-mem-open:latest
    container_name: worker-subscription-email
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=prefork --concurrency=4 --queues=subscription_email_tasks --time-limit=3600 --soft-time-limit=3300 --max-tasks-per-child=50 --prefetch-multiplier=1 -n subscription_email_worker@%h
    restart: unless-stopped
    networks:
      - celery

  # Workflow trigger worker - For triggering workflows (prefork, low concurrency)
  worker-workflow-trigger:
    image: redbear-mem-open:latest
    container_name: worker-workflow-trigger
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app worker -E --loglevel=info --pool=prefork --concurrency=2 --queues=workflow_trigger_tasks --max-tasks-per-child=50 -n workflow_trigger_worker@%h
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - celery

  celery-task-scheduler:
    image: redbear-mem-open:latest
    container_name: celery-task-scheduler
    env_file:
      - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    command: python -m app.celery_task_scheduler
    restart: unless-stopped
    healthcheck:
      test:  CMD curl -f 127.0.0.1:8001 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - celery

  # Celery Beat - scheduler
  beat:
    image: redbear-mem-open:latest
    container_name: celery-beat
    env_file:
      - .env
    volumes:
      - ./files:/files
      - /etc/localtime:/etc/localtime:ro
    command: celery -A app.celery_worker.celery_app beat --loglevel=info
    restart: unless-stopped
    networks:
      - celery
    depends_on:
      - worker-memory

  sandbox:
    image: redbear_sandbox:latest
    container_name: sandbox
    ports:
      - "8194"
    command: /code/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 8194 --log-level debug
    restart: unless-stopped
    networks:
      - sandbox

networks:
  celery:
  sandbox:
